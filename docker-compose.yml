services:
  db:
    image: postgres:16-alpine
    container_name: fittrack_db
    environment:
      POSTGRES_DB: fittrack
      POSTGRES_USER: fittrack_user
      POSTGRES_PASSWORD: fittrack_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./src/FitTrack.API
      dockerfile: Dockerfile
    container_name: fittrack_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=fittrack;Username=fittrack_user;Password=fittrack_pass
      - Jwt__Key=your-super-secret-key-min-32-chars-long
      - Jwt__Issuer=FitTrackAPI
    ports:
      - "5000:8080"
    depends_on:
      - db

volumes:
  postgres_data: